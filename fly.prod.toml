app = "kairn-prod"
primary_region = "cdg"

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS        = "http://+:8080"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
